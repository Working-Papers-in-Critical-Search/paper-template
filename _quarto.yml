project:
  type: website
  output-dir: _site

website:
  title: "Working Papers in Critical Search"
  site-url: https://working-papers-in-critical-search.github.io/
  open-graph: true
  twitter-card: true
  # No Quarto navbar / page-footer — chrome injected via includes below
  # to match the journal home site.
  # NOTE for new papers: override site-url with the per-paper URL,
  # e.g. https://working-papers-in-critical-search.github.io/paper-NNN-slug/

format:
  html:
    theme:
      - cosmo
      - _tokens.scss
      - _custom.scss
      - _paper.scss
    toc: true
    code-fold: true
    code-tools: true
    anchor-sections: false
    title-block-style: default
    smooth-scroll: true
    link-external-newwindow: true
    include-in-header:
      - _includes/fonts.html
      # When cloning this template for a new paper, update the three URLs below
      # to match the paper's deployed subpath (must match site-url above).
      - text: |
          <link rel="canonical" href="https://working-papers-in-critical-search.github.io/paper-NNN-slug/">
          <meta property="og:url" content="https://working-papers-in-critical-search.github.io/paper-NNN-slug/">
          <meta name="twitter:url" content="https://working-papers-in-critical-search.github.io/paper-NNN-slug/">
    include-before-body:
      - _includes/topbar.html
    include-after-body:
      - _includes/footer.html
      - _includes/mobile-toc.html
      - text: '<script src="https://hypothes.is/embed.js" async></script>'

comments:
  giscus:
    repo: Working-Papers-in-Critical-Search/home
    category: "Comments"
    mapping: url
    reactions-enabled: true
    loading: lazy
    input-position: top

execute:
  freeze: auto
